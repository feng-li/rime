# Rime schema
# encoding: utf-8

__include: luna_pinyin.schema:/

schema:
  schema_id: luna_pinyin_simp
  name: 朙月拼音 | 简体中文
  version: "0.22"
  author:
    - 佛振 <chen.sst@gmail.com>
  description: |
    朙月拼音，简化字输出模式。

switches:
  - name: ascii_mode
    reset: 1
    states: [ 中文, 🔤 ]
  - name: full_shape
    reset: 0
    states: [ 半角, 全角 ]
  - name: ascii_punct
    reset: 0
    states: [ 。，, ．， ]
  - name: zh_simp
    reset: 1
    states: [ 繁體, 简体 ]
  - name: show_emoji
    reset: 0
    states: [ "🈚️️😞", "🈶️️😃" ]

#    states: [ 。，, ．， ]

emoji_conversion:
  opencc_config: emoji.json
  option_name: show_emoji
  tags: abc
  # tips: all    # Emoji 显示注释（去掉 # 开启）

translator:
  dictionary: luna_pinyin.extended   #  载入朙月拼音扩充词库
  prism: luna_pinyin_simp

simplifier:
  option_name: zh_simp


english:
  dictionary: easy_en
  spelling_hints: 9
  enable_completion: false      # 是否启用英文输入联想补全
  enable_sentence: false
  initial_quality: -4            # 调整英文候选词的位置，如 -3 会更靠后


engine:
  filters:
    - simplifier
    - simplifier@emoji_conversion
    - uniquifier
    - charset_filter@gbk              # (※3) GBK 过滤
    - single_char_filter

key_binder:
  bindings/+:
    - { when: always, accept: Control+Shift+4, toggle: zh_simp }
    - { when: always, accept: Control+Shift+dollar, toggle: zh_simp }
